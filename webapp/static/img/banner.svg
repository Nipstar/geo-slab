<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97757"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DFD0"/>
      <stop offset="50%" style="stop-color:#D97757"/>
      <stop offset="100%" style="stop-color:#E8DFD0"/>
    </linearGradient>
    <linearGradient id="slabGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D97757"/>
      <stop offset="100%" style="stop-color:#B8614A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- GEO text — large brutalist weight -->
  <text x="40" y="110" font-family="'Courier New', monospace" font-weight="900" font-size="90" fill="url(#textGrad)" letter-spacing="6">GEO</text>

  <!-- SLAB — concrete block style -->
  <rect x="38" y="125" width="265" height="70" fill="url(#slabGrad)" rx="3"/>
  <text x="170" y="174" font-family="'Courier New', monospace" font-weight="900" font-size="52" fill="#1a1a2e" text-anchor="middle" letter-spacing="12">SLAB</text>

  <!-- Accent line -->
  <rect x="40" y="208" width="260" height="3" fill="url(#accent)" rx="1"/>

  <!-- Byline -->
  <text x="40" y="235" font-family="'Courier New', monospace" font-size="13" fill="#B8A899" letter-spacing="0.5">Generative Engine Optimization</text>
  <text x="40" y="255" font-family="'Courier New', monospace" font-size="12" fill="#8A7E72" letter-spacing="0.5">by Antek Automation</text>

  <!-- Vertical accent line separating left and right -->
  <rect x="480" y="40" width="2" height="230" fill="#D97757" opacity="0.4" rx="1"/>

  <!-- Right side: Commands list -->
  <g font-family="'Courier New', monospace" font-size="13" text-anchor="end">
    <text x="855" y="55"><tspan fill="#D97757">/audit </tspan><tspan fill="#8A7E72">&lt;url&gt;</tspan></text>
    <text x="855" y="79"><tspan fill="#D97757">/crawlers </tspan><tspan fill="#8A7E72">&lt;url&gt;</tspan></text>
    <text x="855" y="103"><tspan fill="#D97757">/citability </tspan><tspan fill="#8A7E72">&lt;url&gt;</tspan></text>
    <text x="855" y="127"><tspan fill="#D97757">/platforms </tspan><tspan fill="#8A7E72">9 AI models</tspan></text>
    <text x="855" y="151"><tspan fill="#D97757">/brands </tspan><tspan fill="#8A7E72">&lt;url&gt;</tspan></text>
    <text x="855" y="175"><tspan fill="#D97757">/schema </tspan><tspan fill="#8A7E72">&lt;url&gt;</tspan></text>
    <text x="855" y="199"><tspan fill="#D97757">/report-pdf</tspan></text>
    <text x="855" y="223"><tspan fill="#D97757">/compare </tspan><tspan fill="#8A7E72">&lt;domain&gt;</tspan></text>
    <text x="855" y="247"><tspan fill="#D97757">/proposal </tspan><tspan fill="#8A7E72">&lt;domain&gt;</tspan></text>
    <text x="855" y="271"><tspan fill="#D97757">/live </tspan><tspan fill="#8A7E72">&lt;url&gt;</tspan></text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="295" width="900" height="25" fill="#D97757" opacity="0.3"/>
  <text x="450" y="312" font-family="'Courier New', monospace" font-size="11" fill="#8A7E72" text-anchor="middle" letter-spacing="1">13 skills  ·  6 agents  ·  9 platforms  ·  neo brutalist  ·  antekautomation.com</text>
</svg>
